<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Basic Calculator</h1>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br><br>
    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('subtract')">Subtract</button>
    <button onclick="calculate('multiply')">Multiply</button>
    <button onclick="calculate('divide')">Divide</button>
    <br><br>
    <div id="result"></div>

    <script>
        // Function to perform calculation by calling the server routes
        async function calculate(operation) {
            // Get the values from the input fields
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            // Check if both numbers are provided
            if (!num1 || !num2) {
                document.getElementById('result').innerText = 'Please enter both numbers.';
                return;
            }
            // Construct the URL for the server route
            const url = `http://localhost:3000/${operation}/${num1}/${num2}`; // Assuming server runs on port 3000
            try {
                // Fetch the result from the server
                const response = await fetch(url);
                const result = await response.text();
                // Display the result
                document.getElementById('result').innerText = `Result: ${result}`;
            } catch (error) {
                // Handle any errors
                document.getElementById('result').innerText = 'Error: Unable to calculate.';
            }
        }
    </script>
    <script src ="Exercise2.2.js"></script>
</body>
</html>
