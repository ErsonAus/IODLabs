<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 4 Exercise 6</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Posts from JSON Placeholder</h1>
        <form id="postForm" class="mb-4">
            <div class="form-group">
                <label for="postCount">Number of Posts to Display:</label>
                <input type="number" id="postCount" class="form-control" value="10" min="1" max="100">
            </div>
            <button type="submit" class="btn btn-primary">Fetch Posts</button>
        </form>
        <div id="postContainer" class="row"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/main.js"></script>
</body>
<script>
    // JavaScript code for fetching posts from JSON Placeholder API and displaying them as Bootstrap cards

const postsContainer = document.getElementById('posts-container');
const postLimitForm = document.getElementById('post-limit-form');
const postLimitInput = document.getElementById('post-limit-input');

// Function to fetch posts using Fetch API
async function fetchPostsFetch(limit = 10) {
    try {
        const response = await fetch(`https://jsonplaceholder.typicode.com/posts?_limit=${limit}`);
        const data = await response.json();
        displayPosts(data);
    } catch (error) {
        console.error('Error fetching posts with Fetch API:', error);
    }
}

// Function to fetch posts using Axios
async function fetchPostsAxios(limit = 10) {
    try {
        const response = await axios.get(`https://jsonplaceholder.typicode.com/posts?_limit=${limit}`);
        displayPosts(response.data);
    } catch (error) {
        console.error('Error fetching posts with Axios:', error);
    }
}

// Function to display posts as Bootstrap cards
function displayPosts(posts) {
    postsContainer.innerHTML = '';
    posts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'col-md-4 mb-4';
        card.innerHTML = `
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">${post.title}</h5>
                    <p class="card-text">${post.body}</p>
                </div>
            </div>
        `;
        postsContainer.appendChild(card);
    });
}

// Event listener for form submission
postLimitForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const limit = postLimitInput.value || 10;
    fetchPostsFetch(limit); // Fetch posts using Fetch API
    fetchPostsAxios(limit); // Fetch posts using Axios
});

// Initial fetch of posts
fetchPostsFetch(); // Default fetch on page load
fetchPostsAxios(); // Default fetch on page load
</script>
</html>
