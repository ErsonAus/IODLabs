<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .calculator {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: right;
            border: 2px solid #667eea;
            border-radius: 5px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button.operator {
            background: #ff6b6b;
        }
        button.operator:hover {
            background: #ee5a52;
        }
        button.equals {
            background: #51cf66;
            grid-column: span 2;
        }
        button.equals:hover {
            background: #40c057;
        }
        button.reset {
            background: #ffa94d;
            grid-column: span 2;
        }
        button.reset:hover {
            background: #ff922b;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Requirement a): Display area for numbers -->
        <input type="text" id="display" placeholder="0" readonly>
        
        <div class="buttons">
            <!-- Number buttons -->
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="setOperator('/')">÷</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="setOperator('*')">×</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="setOperator('-')">−</button>

            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <!-- Requirement Choose an operator -->
            <button class="operator" onclick="setOperator('+')">+</button>
            
            <!-- Requirement Get the result -->
            <button class="equals" onclick="calculate()">=</button>
            
            <!-- Requirement Reset the screen -->
            <button class="reset" onclick="resetCalculator()">RESET</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let firstNum = '';
        let operator = '';
        let secondNum = '';

        // Requirement Get data (two numbers) - Append numbers to display
        function appendNumber(num) {
            if (num === '.' && secondNum.includes('.')) return; // Prevent multiple decimals
            secondNum += num;
            display.value = secondNum;
        }

        // Requirement Choose an operator
        function setOperator(op) {
            if (secondNum === '') return; // Prevent setting operator without first number
            if (firstNum !== '') calculate(); // Chain operations
            firstNum = secondNum;
            operator = op;
            secondNum = '';
        }

        // Requirement Get the result - Calculate and display result
        function calculate() {
            if (firstNum === '' || secondNum === '' || operator === '') return;
            
            let result;
            const num1 = parseFloat(firstNum);
            const num2 = parseFloat(secondNum);

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    result = num2 !== 0 ? num1 / num2 : 'Error';
                    break;
            }

            display.value = result;
            firstNum = result;
            secondNum = '';
            operator = '';
        }

        // Requirement Reset the screen - Clear all values
        function resetCalculator() {
            display.value = '0';
            firstNum = '';
            operator = '';
            secondNum = '';
        }
    </script>
</body>
</html>
