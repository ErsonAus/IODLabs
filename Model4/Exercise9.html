<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCharts - Fake Store API</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.1/dist/echarts.min.js"></script>
</head>
<body>
    <!-- Container for the category chart -->
    <div id="categoryChart" style="width: 900px; height: 600px;"></div>
    
    <!-- Container for the price bracket chart -->
    <div id="priceChart" style="width: 900px; height: 600px; margin-top: 40px;"></div>

    <script type="text/javascript">
        // Initialize echarts instances
        let categoryChart = echarts.init(document.getElementById('categoryChart'));
        let priceChart = echarts.init(document.getElementById('priceChart'));

        // Fetch product data from Fake Store API
        fetch('https://fakestoreapi.com/products')
            .then((response) => response.json())
            .then((products) => {
                console.log('Fetched products:', products);

                // Process data for category chart
                // Count products in each category
                const categoryCount = {};
                products.forEach(product => {
                    const category = product.category;
                    categoryCount[category] = (categoryCount[category] || 0) + 1;
                });

                // Extract category names and counts for chart display
                const categoryNames = Object.keys(categoryCount);
                const categoryCounts = Object.values(categoryCount);

                console.log('Category counts:', categoryCount);

                // Configure options for category bar chart
                const categoryOptions = {
                    title: { text: 'Fake Store Categories - Product Count' },
                    xAxis: {
                        type: 'category',
                        data: categoryNames
                    },
                    yAxis: {
                        type: 'value'
                    },
                    series: [{
                        name: '# products',
                        type: 'bar',
                        data: categoryCounts,
                        itemStyle: { color: '#3398DB' }
                    }]
                };

                // Display the category chart
                categoryChart.setOption(categoryOptions);

                // Process data for price bracket chart
                // Define price brackets and count products in each
                const priceBrackets = {
                    '$1-$100': 0,
                    '$100-$250': 0,
                    '$250-$500': 0,
                    '$500-$1000': 0
                };

                // Categorize products by price bracket
                products.forEach(product => {
                    const price = product.price;
                    if (price >= 1 && price <= 100) {
                        priceBrackets['$1-$100']++;
                    } else if (price > 100 && price <= 250) {
                        priceBrackets['$100-$250']++;
                    } else if (price > 250 && price <= 500) {
                        priceBrackets['$250-$500']++;
                    } else if (price > 500 && price <= 1000) {
                        priceBrackets['$500-$1000']++;
                    }
                });

                console.log('Price bracket counts:', priceBrackets);

                // Configure options for price bracket pie chart
                const priceOptions = {
                    title: { text: 'Fake Store Products by Price Bracket' },
                    tooltip: {
                        trigger: 'item'
                    },
                    series: [{
                        name: 'Product Count',
                        type: 'pie',
                        data: Object.entries(priceBrackets).map(([bracket, count]) => ({
                            value: count,
                            name: bracket
                        })),
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }]
                };

                // Display the price bracket chart
                priceChart.setOption(priceOptions);
            })
            .catch((error) => {
                console.error('Error fetching data:', error);
            });
    </script>
</body>
</html>
